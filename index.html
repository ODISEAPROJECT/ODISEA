 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ODISEA</title>

<style>
body {
margin: 0;
overflow: hidden;
font-family: Arial, sans-serif;
color: white;
background: black;
}

/* VIDEO DE FONDO */
video {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
object-fit: cover;
z-index: -1;
filter: brightness(0.45) contrast(1.1);
}

/* CONTENIDO */

.container {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
text-align: center;
width: 90%;
animation: fadeIn 1.5s ease-out;
}

@keyframes fadeIn {
from { opacity: 0; transform: translate(-50%, -45%); }
to { opacity: 1; transform: translate(-50%, -50%); }
}

.title {
font-size: 46px;

font-weight: bold;
letter-spacing: 6px;
text-transform: uppercase;
}

.model {
margin-top: 10px;
font-size: 18px;
opacity: 0.9;
}

.verified {
margin-top: 25px;
font-size: 13px;
letter-spacing: 2px;
text-transform: uppercase;
opacity: 0.85;
}

.product {
font-size: 12px;
opacity: 0.6;
margin-top: 5px;
}

/* BOTÓN */
.btn {
margin-top: 30px;
padding: 14px 24px;

border-radius: 12px;
border: 1px solid white;
background: rgba(255,255,255,0.1);
color: white;
font-weight: bold;
letter-spacing: 1px;
backdrop-filter: blur(8px);
cursor: pointer;
}

.btn:active {
transform: scale(0.97);

}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="bgmusic" loop preload="auto">
<source src="audio.mp3" type="audio/mpeg">

</audio>

<!-- CONTENIDO -->
<div class="container">
<div class="title">ODISEA</div>
<div class="model">Model: Rockstar</div>

<div class="verified">AUTHENTICITY VERIFIED</div>
<div class="product">Original Product</div>

<button class="btn" id="startBtn">

TAP TO EXPERIENCE
</button>
</div>

<!-- SCRIPT DE AUDIO (iPhone FIX REAL) -->
<script>
document.getElementById("startBtn").addEventListener("click", async function () {

const audio = document.getElementById("bgmusic");

try {
await audio.play();
this.style.display = "none";
} catch (err) {
alert("Activa el sonido o revisa el modo silencio del iPhone");
console.log(err);
}
});
</script>

</body>
</html>
