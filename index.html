
<!DOCTYPE html>
<html>
<head>
<title>Mi Marca</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
margin: 0;
overflow: hidden;
font-family: Arial;
}

video {
position: fixed;
right: 0;
bottom: 0;
min-width: 100%;
min-height: 100%;
object-fit: cover;
z-index: -1;
}

.content {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
color: white;
text-align: center;
}

img {
width: 200px;
border-radius: 20px;
margin-bottom: 15px;
}
</style>
</head>

<body>

<!-- VIDEO DE FONDO -->
<video autoplay muted loop playsinline>
<source src="video.mp4" type="video/mp4">
</video>

<!-- MUSICA -->
<audio autoplay loop>
<source src="audio.mp3" type="audio/mp3">
</audio>

<div class="content">
<img src="pedido.jpg">
<h2>Gracias por tu compra</h2>
</div>

</body>
</html>
